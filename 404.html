<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل...</title>
    <style>
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #10b981;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 {
            color: #10b981;
            margin-bottom: 10px;
        }
        p {
            color: #9ca3af;
        }
        .redirect-link {
            color: #10b981;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>جاري التحويل إلى الموقع الرئيسي...</h2>
        <p>من فضلك انتظر لحظة</p>
        <a href="https://imtihan-eight.vercel.app/" class="redirect-link">انقر هنا إذا لم يتم تحويلك تلقائياً</a>
    </div>

    <script>
        // التحويل المباشر إلى الموقع الأساسي
        window.location.href = "https://imtihan-eight.vercel.app/";
    </script>
</body>
</html>
